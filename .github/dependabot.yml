version: 2
updates:
  # NuGet packages
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 25
    groups:
      dotnet:
        patterns:
          - "*" # Prefer a single PR per solution update
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
  # Git submodules
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      gitsubmodules:
        patterns:
          - "*"
